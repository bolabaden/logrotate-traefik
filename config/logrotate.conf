# Example logrotate configuration for Traefik logs
# This file shows the configuration that will be generated automatically

/var/log/traefik/*.log {
    # Rotation frequency - can be: hourly, daily, weekly, monthly
    hourly
    
    # Rotate when log file reaches this size
    size 10M
    
    # Keep this many rotated files
    rotate 20
    
    # Compress rotated files (saves disk space)
    compress
    
    # Don't compress the most recent rotated file
    delaycompress
    
    # Don't error if log file is missing
    missingok
    
    # Don't rotate empty files
    notifempty
    
    # Create new log file after rotation with these permissions
    create 644 root root
    
    # Copy the file and truncate original (safe for processes writing to it)
    copytruncate
    
    # Commands to run after rotation
    postrotate
        echo "[POSTROTATE] $(date -u '+%Y-%m-%dT%H:%M:%SZ') Checking for old gzipped logs..."
        TOTAL_SIZE=$(du -sm /var/log/traefik 2>/dev/null | cut -f1 || echo 0)
        echo "[POSTROTATE] Directory size: $TOTAL_SIZE MB"
        if [ "$TOTAL_SIZE" -gt "50" ]; then
            echo "[POSTROTATE] Cleaning up old gz logs beyond 10 most recent"
            find /var/log/traefik -name "*.gz" -type f -printf '%T@ %p\n' 2>/dev/null | \
                sort -rn | tail -n +11 | cut -d' ' -f2- | \
                xargs -r rm -f
        fi
    endscript
}
