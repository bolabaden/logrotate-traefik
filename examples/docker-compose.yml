# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json



# Docker Compose example for Traefik Log Rotation service
# This example shows how to integrate logrotate-traefik with your existing setup



networks:
  web:
    external: false



volumes:
  traefik-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CONFIG_PATH:-./volumes}/traefik/logs



services:
  # Example Traefik service (for reference)
  traefik:
    image: docker.io/traefik:v3.5.2
    container_name: traefik
    networks:
      - web
    command:
      - '--api.dashboard=true'
      - '--api.debug=true'
      - '--log.level=INFO'
      - '--log.filePath=/var/log/traefik/traefik.log'
      - '--log.format=json'
      - '--accessLog=true'
      - '--accessLog.bufferingSize=0'
      - '--accessLog.fields.headers.defaultMode=drop'
      - '--accessLog.fields.headers.names.User-Agent=keep'
      - '--accessLog.fields.names.StartUTC=drop'
      - '--accessLog.filePath=/var/log/traefik/traefik.log'
      - '--accessLog.filters.statusCodes=100-999'
      - '--accessLog.format=json'
      - '--providers.docker=true'
      - '--providers.docker.exposedByDefault=false'
      - '--providers.file.directory=/traefik/dynamic'
      - '--providers.file.watch=true'
      - '--serversTransport.insecureSkipVerify=true'
      - '--entryPoints.web.address=:80'
      - '--entryPoints.websecure.address=:443'
    ports:
      - 80:80
      - 443:443
      - 127.0.0.1:8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-logs:/var/log/traefik
    healthcheck:
      test: ["CMD-SHELL", "traefik healthcheck --ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: always

  whoami:
    # 🔹🔹 Whoami 🔹🔹
    image: docker.io/traefik/whoami:v1.11
    container_name: whoami
    networks:
      - web
    restart: always
  # Traefik Log Rotation and Monitoring service
  logrotate-traefik:
    depends_on:
      traefik:
        condition: service_healthy
    build: 
      context: ..
      dockerfile: Dockerfile
    image: docker.io/bolabaden/logrotate-traefik:latest
    container_name: logrotate-traefik
    networks:
      - web
    volumes:
      - traefik-logs:/var/log/traefik:rw  # Mount the same log volume as Traefik
    environment:
      PUID: ${PUID:-1001}
      PGID: ${PGID:-1001}
      TZ: ${TZ:-America/Chicago}
      # Log configuration
      LOG_LEVEL: ${LOG_LEVEL:-info}                    # debug, info, warning, error
      TRAEFIK_LOG_FILENAME: ${TRAEFIK_LOG_FILENAME:-traefik.log}
      # Logrotate configuration
      LOGROTATE_LOOP_SLEEP: ${LOGROTATE_LOOP_SLEEP:-300}        # Check interval in seconds
      LOGROTATE_MAXSIZE: ${LOGROTATE_MAXSIZE:-10M}              # Max file size before rotation
      LOGROTATE_MAXCOUNT: ${LOGROTATE_MAXCOUNT:-20}             # Number of rotated files to keep
      LOGROTATE_ROTATE_FREQ: ${LOGROTATE_ROTATE_FREQ:-hourly}   # hourly, daily, weekly, monthly
      LOGROTATE_MAXDIR_MB: ${LOGROTATE_MAXDIR_MB:-50}          # Max total directory size in MB
      LOGROTATE_KEEP_GZ: ${LOGROTATE_KEEP_GZ:-10}              # Number of compressed files to keep
      # Monitoring configuration
      STATUS_CODES: ${STATUS_CODES:-100-999}                    # Status codes to monitor (comma-separated ranges)
    mem_limit: 64M
    mem_reservation: 8M
    cpus: 0.1
    restart: always
